## 🐳 **DOCKER FILES**

### **docker-compose.yml**
version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: queryfox_backend
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    ports:
      - "8000:8000"
    networks:
      - queryfox_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: queryfox_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - queryfox_network

networks:
  queryfox_network:
    driver: bridge
